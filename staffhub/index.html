<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Training Hub — Learning Hive</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ocean:#00AFBA;--berry:#6F4B99;--strawberry:#EF3340;--sunshine:#FFDE44;--sky:#51BAE8;--candyfloss:#F298BC;--bg:#F7F6F3;--card:#FFFFFF;--text:#1A1A1A;--muted:#6B7280;--border:#E8E4DF;--green:#10B981;--amber:#F59E0B;--red:#EF4444}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-card{background:var(--card);border-radius:16px;padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
    .login-card h1{font-size:22px;font-weight:700;color:var(--ocean);margin-bottom:4px}
    .login-card .tagline{font-size:12px;color:var(--berry);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px}
    .login-card h2{font-size:16px;font-weight:600;margin-bottom:20px}
    .login-card input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-family:'Poppins',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;margin-bottom:12px}
    .login-card input:focus{border-color:var(--ocean)}
    .msg{font-size:13px;margin-top:4px;margin-bottom:8px;display:none}
    .msg-error{color:var(--strawberry)}
    .msg-success{color:var(--green)}
    .msg-info{color:var(--ocean)}
    .btn{display:inline-block;padding:12px 32px;border:none;border-radius:8px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
    .btn-primary{background:var(--ocean);color:#fff;width:100%}
    .btn-primary:hover{background:#009BA5}
    .btn-primary:disabled{background:#ccc;cursor:not-allowed}
    .btn-outline{background:transparent;color:var(--ocean);border:2px solid var(--ocean)}
    .btn-outline:hover{background:var(--ocean);color:#fff}
    .btn-sm{padding:8px 20px;font-size:13px}
    .link-btn{background:none;border:none;color:var(--ocean);font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer;text-decoration:underline;margin-top:12px}
    .link-btn:hover{color:var(--berry)}

    .app{display:none}
    .header{background:#fff;border-bottom:3px solid var(--ocean);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .header-left{display:flex;align-items:center;gap:12px}
    .header h1{font-size:18px;font-weight:700;color:var(--ocean)}
    .header .subtitle{font-size:11px;color:var(--berry);letter-spacing:1px;text-transform:uppercase}
    .tabs{display:flex;gap:4px}
    .tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--muted);border:none;font-family:'Poppins',sans-serif}
    .tab:hover{background:#f0efec}
    .tab.active{background:var(--ocean);color:#fff}
    .content{padding:24px;max-width:1400px;margin:0 auto}

    .search-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    .autocomplete-wrapper{position:relative;flex:1;min-width:250px}
    .search-bar input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-family:'Poppins',sans-serif;font-size:14px;outline:none;margin-bottom:0}
    .search-bar input:focus{border-color:var(--ocean)}
    .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--border);border-top:none;border-radius:0 0 8px 8px;max-height:240px;overflow-y:auto;z-index:100;display:none}
    .autocomplete-item{padding:10px 16px;cursor:pointer;font-size:14px;transition:background 0.1s}
    .autocomplete-item:hover,.autocomplete-item.hl{background:#E0F7FA}

    .profile-header{background:linear-gradient(135deg,var(--ocean),var(--berry));border-radius:16px;padding:32px;color:#fff;margin-bottom:24px;display:flex;align-items:center;gap:24px}
    .profile-avatar{width:64px;height:64px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0}
    .profile-info h2{font-size:22px;font-weight:700}
    .profile-info p{font-size:13px;opacity:0.85;margin-top:4px}

    .section{background:var(--card);border-radius:12px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.04);overflow:hidden}
    .section-header{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
    .section-header h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
    .section-header .chevron{transition:transform 0.2s;color:var(--muted)}
    .section-header .chevron.open{transform:rotate(180deg)}
    .section-body{padding:0 24px 20px}
    .section-border-ocean{border-left:4px solid var(--ocean)}
    .section-border-berry{border-left:4px solid var(--berry)}
    .section-border-sky{border-left:4px solid var(--sky)}
    .section-border-sunshine{border-left:4px solid var(--sunshine)}
    .section-border-candyfloss{border-left:4px solid var(--candyfloss)}

    .data-table{width:100%;border-collapse:collapse;font-size:13px}
    .data-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
    .data-table td{padding:10px 12px;border-bottom:1px solid #f3f2ef}
    .data-table tr:last-child td{border-bottom:none}
    .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
    .dot-green{background:var(--green)}.dot-amber{background:var(--amber)}.dot-red{background:var(--red)}.dot-gray{background:#D1D5DB}

    .kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .kv-item{padding:12px;background:var(--bg);border-radius:8px}
    .kv-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
    .kv-value{font-size:14px;font-weight:600;margin-top:4px}

    .dashboard-controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
    .dashboard-controls select{padding:10px 16px;border:2px solid var(--border);border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;outline:none;background:#fff}
    .dashboard-stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    .stat-card{background:var(--card);border-radius:12px;padding:20px 24px;flex:1;min-width:140px;box-shadow:0 2px 12px rgba(0,0,0,0.04);text-align:center}
    .stat-number{font-size:32px;font-weight:800}
    .stat-label{font-size:12px;color:var(--muted);margin-top:4px}
    .stat-green .stat-number{color:var(--green)}.stat-amber .stat-number{color:var(--amber)}.stat-red .stat-number{color:var(--red)}.stat-gray .stat-number{color:var(--muted)}
    .dashboard-table-wrap{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
    .dashboard-table-wrap .data-table td{cursor:pointer}
    .dashboard-table-wrap .data-table tr:hover td{background:#f8f8f6}

    .loading{text-align:center;padding:40px;color:var(--muted)}
    .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--ocean);border-radius:50%;animation:spin 0.6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:40px;color:var(--muted);font-size:14px}
    .rainbow{height:4px;background:linear-gradient(90deg,var(--candyfloss),var(--sunshine),var(--ocean),var(--sky),var(--berry))}
    .export-row{display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px}
    .hidden{display:none}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
    .badge-green{background:rgba(16,185,129,0.2);color:#059669}
    .badge-amber{background:rgba(245,158,11,0.2);color:#D97706}
    .badge-red{background:rgba(239,68,68,0.2);color:#DC2626}
    .badge-gray{background:rgba(107,114,128,0.2);color:#4B5563}

    @media(max-width:768px){.profile-header{flex-direction:column;text-align:center}.kv-grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}.dashboard-stats{flex-direction:column}}
  </style>
</head>
<body>

  <!-- ═══ LOGIN ═══ -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>Learning Hive</h1>
      <p class="tagline">Nurturing potential together</p>
      <div class="rainbow" style="margin-bottom:24px;border-radius:2px;"></div>
      <h2 id="loginTitle">Staff Training Hub</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;" id="loginSubtitle">Sign in to continue</p>

      <!-- Login form -->
      <div id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email address" onkeydown="if(event.key==='Enter')document.getElementById('loginPassword').focus()">
        <input type="password" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
        <p class="msg msg-error" id="loginError"></p>
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
        <button class="link-btn" onclick="showForgotPassword()">Forgot password?</button>
      </div>

      <!-- First-time password setup -->
      <div id="setupForm" class="hidden">
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">Create a password to secure your account.</p>
        <input type="password" id="setupPassword" placeholder="Create password (min 6 characters)" onkeydown="if(event.key==='Enter')document.getElementById('setupConfirm').focus()">
        <input type="password" id="setupConfirm" placeholder="Confirm password" onkeydown="if(event.key==='Enter')doSetPassword()">
        <p class="msg msg-error" id="setupError"></p>
        <button class="btn btn-primary" id="setupBtn" onclick="doSetPassword()">Create Password</button>
        <button class="link-btn" onclick="showLoginForm()">Back to sign in</button>
      </div>

      <!-- Forgot password -->
      <div id="forgotForm" class="hidden">
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">Enter your email and we'll send a reset link.</p>
        <input type="email" id="forgotEmail" placeholder="Email address" onkeydown="if(event.key==='Enter')doResetRequest()">
        <p class="msg msg-success" id="forgotSuccess"></p>
        <p class="msg msg-error" id="forgotError"></p>
        <button class="btn btn-primary" id="forgotBtn" onclick="doResetRequest()">Send Reset Link</button>
        <button class="link-btn" onclick="showLoginForm()">Back to sign in</button>
      </div>

      <!-- Reset password (via link) -->
      <div id="resetForm" class="hidden">
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">Enter your new password.</p>
        <input type="password" id="resetPassword" placeholder="New password (min 6 characters)" onkeydown="if(event.key==='Enter')document.getElementById('resetConfirm').focus()">
        <input type="password" id="resetConfirm" placeholder="Confirm new password" onkeydown="if(event.key==='Enter')doResetPassword()">
        <p class="msg msg-error" id="resetError"></p>
        <button class="btn btn-primary" id="resetBtn" onclick="doResetPassword()">Reset Password</button>
      </div>
    </div>
  </div>

  <!-- ═══ APP ═══ -->
  <div id="app" class="app">
    <div class="rainbow"></div>
    <div class="header">
      <div class="header-left"><div><h1>Staff Training Hub</h1><p class="subtitle">Learning Hive</p></div></div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('search',this)">Search</button>
        <button class="tab" onclick="switchTab('dashboard',this)">Dashboard</button>
      </div>
    </div>
    <div id="searchView" class="content">
      <div class="search-bar">
        <div class="autocomplete-wrapper">
          <input type="text" id="searchInput" placeholder="Search by tutor name..." autocomplete="off" oninput="onSearchInput()" onkeydown="onSearchKeydown(event)">
          <div class="autocomplete-list" id="autocompleteList"></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="doSearch()" style="margin-top:0;">Search</button>
      </div>
      <div id="searchResults"></div>
    </div>
    <div id="dashboardView" class="content hidden">
      <div class="dashboard-controls">
        <select id="areaFilter" onchange="filterDashboard()"><option value="">All Areas / Councils</option></select>
        <select id="exportType" onchange="filterDashboard()">
          <option value="summary">Summary (internal)</option>
          <option value="audit-all">Full Audit (all tutors)</option>
          <option value="audit-compliant">Full Audit (compliant only)</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="doExport()">Export CSV</button>
      </div>
      <div class="dashboard-stats" id="dashboardStats"></div>
      <div class="dashboard-table-wrap" id="dashboardTable"></div>
    </div>
  </div>

<script>
  var API_URL='https://script.google.com/macros/s/AKfycbyerZUIFzGg3YeaZ0ftFKZY2xNyFjvoV0-OkY0J4rmNlR9C291-_fvZIlcJ3-5Bk4ff/exec';
  var sessionToken='';
  var tutorList=[];
  var dashboardData=[];
  var hlIdx=-1;
  var setupEmail='';
  var resetToken='';

  // Check URL for reset token on load
  (function(){
    var params=new URLSearchParams(window.location.search);
    var rt=params.get('reset');
    if(rt){
      resetToken=rt;
      showResetForm();
      window.history.replaceState({},'',window.location.pathname);
      return;
    }

    // Try to restore session from sessionStorage
    try{
      var saved=JSON.parse(sessionStorage.getItem('hub_session')||'null');
      if(saved&&saved.token&&saved.timestamp){
        var age=(Date.now()-saved.timestamp)/60000; // minutes
        if(age<10){
          sessionToken=saved.token;
          document.getElementById('loginScreen').style.display='none';
          document.getElementById('app').style.display='block';
          loadTutorList();
          // Restore last view
          if(saved.tab==='dashboard'){
            switchTab('dashboard');
            document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
            document.querySelectorAll('.tab')[1].classList.add('active');
          } else if(saved.lastSearch){
            document.getElementById('searchInput').value=saved.lastSearch;
            doSearch();
          }
          return;
        }
      }
    }catch(e){}
  })();

  // ══ API ══
  function apiCall(action,data){
    var payload=Object.assign({action:action,token:sessionToken},data||{});
    return fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload),
      redirect:'follow'
    }).then(function(r){return r.json()}).then(function(d){
      if(d.error==='UNAUTHORIZED'){
        sessionToken='';
        try{sessionStorage.removeItem('hub_session');}catch(e){}
        document.getElementById('app').style.display='none';
        document.getElementById('loginScreen').style.display='flex';
        showLoginForm();
        showMsg('loginError','Session expired. Please sign in again.');
        throw new Error('UNAUTHORIZED');
      }
      return d;
    });
  }

  // ══ UI HELPERS ══
  function showMsg(id,text,type){var el=document.getElementById(id);el.textContent=text;el.style.display=text?'block':'none';}
  function hideAllForms(){['loginForm','setupForm','forgotForm','resetForm'].forEach(function(id){document.getElementById(id).classList.add('hidden')});}

  function showLoginForm(){
    hideAllForms();
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('loginTitle').textContent='Staff Training Hub';
    document.getElementById('loginSubtitle').textContent='Sign in to continue';
    showMsg('loginError','');
  }

  function showSetupForm(email){
    setupEmail=email;
    hideAllForms();
    document.getElementById('setupForm').classList.remove('hidden');
    document.getElementById('loginTitle').textContent='Welcome!';
    document.getElementById('loginSubtitle').textContent='Create a password for '+email;
    showMsg('setupError','');
  }

  function showForgotPassword(){
    hideAllForms();
    document.getElementById('forgotForm').classList.remove('hidden');
    document.getElementById('loginTitle').textContent='Reset Password';
    document.getElementById('loginSubtitle').textContent='';
    document.getElementById('forgotEmail').value=document.getElementById('loginEmail').value;
    showMsg('forgotError','');showMsg('forgotSuccess','');
  }

  function showResetForm(){
    hideAllForms();
    document.getElementById('resetForm').classList.remove('hidden');
    document.getElementById('loginTitle').textContent='Set New Password';
    document.getElementById('loginSubtitle').textContent='';
    showMsg('resetError','');
  }

  function enterApp(result){
    sessionToken=result.token;
    saveSession();
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    loadTutorList();
  }

  function saveSession(extra){
    try{
      var data=JSON.parse(sessionStorage.getItem('hub_session')||'{}');
      data.token=sessionToken;
      data.timestamp=Date.now();
      if(extra)for(var k in extra)data[k]=extra[k];
      sessionStorage.setItem('hub_session',JSON.stringify(data));
    }catch(e){}
  }

  // ══ LOGIN ══
  function doLogin(){
    var email=document.getElementById('loginEmail').value.trim();
    var password=document.getElementById('loginPassword').value;
    showMsg('loginError','');
    if(!email){showMsg('loginError','Please enter your email.');return;}
    document.getElementById('loginBtn').disabled=true;
    apiCall('hublogin',{email:email,password:password}).then(function(r){
      document.getElementById('loginBtn').disabled=false;
      if(r.success){enterApp(r);}
      else if(r.needsSetup){showSetupForm(email);}
      else{showMsg('loginError',r.message||'Login failed.');}
    }).catch(function(e){
      document.getElementById('loginBtn').disabled=false;
      if(e.message!=='UNAUTHORIZED')showMsg('loginError','Connection error. Please try again.');
    });
  }

  // ══ SETUP PASSWORD ══
  function doSetPassword(){
    var pw=document.getElementById('setupPassword').value;
    var pw2=document.getElementById('setupConfirm').value;
    showMsg('setupError','');
    if(pw.length<6){showMsg('setupError','Password must be at least 6 characters.');return;}
    if(pw!==pw2){showMsg('setupError','Passwords do not match.');return;}
    document.getElementById('setupBtn').disabled=true;
    apiCall('hubsetpassword',{email:setupEmail,password:pw}).then(function(r){
      document.getElementById('setupBtn').disabled=false;
      if(r.success){enterApp(r);}
      else{showMsg('setupError',r.message||'Setup failed.');}
    }).catch(function(e){
      document.getElementById('setupBtn').disabled=false;
      if(e.message!=='UNAUTHORIZED')showMsg('setupError','Connection error.');
    });
  }

  // ══ FORGOT PASSWORD ══
  function doResetRequest(){
    var email=document.getElementById('forgotEmail').value.trim();
    showMsg('forgotError','');showMsg('forgotSuccess','');
    if(!email){showMsg('forgotError','Please enter your email.');return;}
    document.getElementById('forgotBtn').disabled=true;
    apiCall('hubresetrequest',{email:email}).then(function(r){
      document.getElementById('forgotBtn').disabled=false;
      if(r.success){showMsg('forgotSuccess',r.message);}
      else{showMsg('forgotError',r.message||'Failed.');}
    }).catch(function(e){
      document.getElementById('forgotBtn').disabled=false;
      showMsg('forgotError','Connection error.');
    });
  }

  // ══ RESET PASSWORD ══
  function doResetPassword(){
    var pw=document.getElementById('resetPassword').value;
    var pw2=document.getElementById('resetConfirm').value;
    showMsg('resetError','');
    if(pw.length<6){showMsg('resetError','Password must be at least 6 characters.');return;}
    if(pw!==pw2){showMsg('resetError','Passwords do not match.');return;}
    document.getElementById('resetBtn').disabled=true;
    apiCall('hubresetpassword',{resetToken:resetToken,password:pw}).then(function(r){
      document.getElementById('resetBtn').disabled=false;
      if(r.success){enterApp(r);}
      else{showMsg('resetError',r.message||'Reset failed.');}
    }).catch(function(e){
      document.getElementById('resetBtn').disabled=false;
      showMsg('resetError','Connection error.');
    });
  }

  // ══ TUTOR LIST ══
  function loadTutorList(){apiCall('hubtutorlist').then(function(r){tutorList=r.tutors||[]});}

  // ══ AUTOCOMPLETE ══
  function onSearchInput(){
    var v=document.getElementById('searchInput').value.trim().toLowerCase();
    var l=document.getElementById('autocompleteList');hlIdx=-1;
    if(v.length<2){l.style.display='none';return;}
    var m=tutorList.filter(function(n){return n.toLowerCase().indexOf(v)>-1}).slice(0,10);
    if(!m.length){l.style.display='none';return;}
    l.innerHTML=m.map(function(n){return'<div class="autocomplete-item" onclick="selectTutor(\''+n.replace(/'/g,"\\'")+"')\">" + esc(n)+'</div>';}).join('');
    l.style.display='block';
  }
  function onSearchKeydown(e){
    var l=document.getElementById('autocompleteList'),items=l.querySelectorAll('.autocomplete-item');
    if(!items.length){if(e.key==='Enter')doSearch();return;}
    if(e.key==='ArrowDown'){e.preventDefault();hlIdx=Math.min(hlIdx+1,items.length-1);uhl(items);}
    else if(e.key==='ArrowUp'){e.preventDefault();hlIdx=Math.max(hlIdx-1,0);uhl(items);}
    else if(e.key==='Enter'){e.preventDefault();if(hlIdx>=0&&items[hlIdx])selectTutor(items[hlIdx].textContent);else doSearch();}
  }
  function uhl(items){items.forEach(function(el,i){el.classList.toggle('hl',i===hlIdx)});}
  function selectTutor(n){document.getElementById('searchInput').value=n;document.getElementById('autocompleteList').style.display='none';doSearch();}
  document.addEventListener('click',function(e){if(!e.target.closest('.autocomplete-wrapper'))document.getElementById('autocompleteList').style.display='none';});

  // ══ SEARCH ══
  function doSearch(){
    var n=document.getElementById('searchInput').value.trim();
    document.getElementById('autocompleteList').style.display='none';
    if(!n)return;
    saveSession({tab:'search',lastSearch:n});
    var c=document.getElementById('searchResults');
    c.innerHTML='<div class="loading"><div class="spinner"></div><p style="margin-top:12px;">Loading profile...</p></div>';
    apiCall('hubsearch',{name:n}).then(function(d){renderProfile(n,d);}).catch(function(e){if(e.message!=='UNAUTHORIZED')c.innerHTML='<div class="empty-state">Error loading profile.</div>';});
  }

  // ══ RENDER ══
  function renderProfile(name,data){
    var c=document.getElementById('searchResults');
    var email=(data.training&&data.training.length>0)?data.training[0].email:'';
    var area=data.dbs?data.dbs.area:'';
    var ini=name.split(' ').map(function(w){return w[0]}).join('').substring(0,2).toUpperCase();
    var h='<div class="profile-header"><div class="profile-avatar">'+ini+'</div><div class="profile-info"><h2>'+esc(name)+'</h2>';
    if(email)h+='<p>'+esc(email)+'</p>';if(area)h+='<p>'+esc(area)+'</p>';
    h+='</div></div>';
    h+='<div class="export-row"><button class="btn btn-outline btn-sm" onclick="exportProfileCSV()">Export CSV</button></div>';

    // Training
    h+='<div class="section section-border-ocean"><div class="section-header" onclick="tog(this)"><h3>📚 Training Records'+(data.training?' ('+data.training.length+')':'')+'</h3><span class="chevron open">▼</span></div><div class="section-body">';
    if(!data.training||!data.training.length){h+='<p class="empty-state">No training records found.</p>';}
    else{
      h+='<table class="data-table"><thead><tr><th>Training</th><th>Date</th><th>Score</th><th>Result</th><th>Certificate</th><th>Expiry</th><th>Source</th></tr></thead><tbody>';
      data.training.forEach(function(r){var ec=expSt(r.expiryRaw);h+='<tr><td><strong>'+esc(r.trainingName)+'</strong><br><span style="font-size:11px;color:var(--muted);">'+esc(r.category)+'</span></td><td>'+esc(r.dateCompleted)+'</td><td>'+esc(r.score)+'</td><td>'+pf(r.passFail)+'</td><td>';if(r.certNumber){h+=esc(r.certNumber);if(r.certLink)h+=' <a href="'+esc(r.certLink)+'" target="_blank" style="color:var(--ocean);">↗</a>';}h+='</td><td><span class="status-dot dot-'+ec+'"></span>'+esc(r.expiryDate)+'</td><td style="font-size:11px;color:var(--muted);">'+esc(r.source)+'</td></tr>';});
      h+='</tbody></table>';
    }
    h+='</div></div>';

    // DBS
    h+='<div class="section section-border-berry"><div class="section-header" onclick="tog(this)"><h3>🔒 DBS Details</h3><span class="chevron open">▼</span></div><div class="section-body">';
    if(!data.dbs){h+='<p class="empty-state">No DBS record found.</p>';}
    else{var dec=expSt(data.dbs.dbsExpiryRaw);h+='<div class="kv-grid">'+kv('DBS Number',data.dbs.dbsNumber)+kv('Level of Check',data.dbs.levelOfCheck)+kv('Check Date',data.dbs.dbsCheckDate)+kv('Issue Date',data.dbs.dbsIssueDate)+kvS('Expiry Date',data.dbs.dbsExpiryDate,dec)+kv('Area',data.dbs.area)+'</div>';}
    h+='</div></div>';

    // References
    h+='<div class="section section-border-sky"><div class="section-header" onclick="tog(this)"><h3>📋 References</h3><span class="chevron open">▼</span></div><div class="section-body">';
    if(!data.refs){h+='<p class="empty-state">No reference data found.</p>';}
    else{h+='<div class="kv-grid">'+kv('Ref 1 Position',data.refs.ref1Position)+kv('Ref 1 Received',data.refs.ref1Received)+kv('Ref 2 Position',data.refs.ref2Position)+kv('Ref 2 Received',data.refs.ref2Received)+kv('Verified by Phone',data.refs.verifiedByPhone||'Not recorded')+'</div>';}
    h+='</div></div>';

    // Suitability
    h+='<div class="section section-border-sunshine"><div class="section-header" onclick="tog(this)"><h3>✅ Suitability Checks</h3><span class="chevron open">▼</span></div><div class="section-body">';
    if(!data.suitability){h+='<p class="empty-state">No suitability data found.</p>';}
    else{h+='<div class="kv-grid">'+kv('Social Media Check',data.suitability.socialCheck||'Not recorded')+kv('Section 128 Check',data.suitability.section128||'Not recorded')+kv('Teaching Checks',data.suitability.teachingChecks||'Not recorded')+'</div>';}
    h+='</div></div>';

    // Interview
    h+='<div class="section section-border-candyfloss"><div class="section-header" onclick="tog(this)"><h3>🎤 Interview</h3><span class="chevron open">▼</span></div><div class="section-body">';
    if(!data.interview){h+='<p class="empty-state">No interview data found.</p>';}
    else{h+='<div class="kv-grid">'+kv('Date',data.interview.date)+kv('Interviewer',data.interview.interviewer)+kv('Hiring Decision',data.interview.hiringDecision)+kv('Professionalism',data.interview.professionalism)+kv('Communication',data.interview.communication)+kv('Safeguarding',data.interview.safeguarding)+kv('SEND/SEMH Experience',data.interview.sendExperience)+kv('Confidence 1:1',data.interview.confidence1to1)+kv('Availability',data.interview.availability)+'</div>';}
    h+='</div></div>';

    c.innerHTML=h;
  }

  // ══ HELPERS ══
  function kv(l,v){return'<div class="kv-item"><div class="kv-label">'+esc(l)+'</div><div class="kv-value">'+esc(v||'—')+'</div></div>';}
  function kvS(l,v,s){return'<div class="kv-item"><div class="kv-label">'+esc(l)+'</div><div class="kv-value"><span class="status-dot dot-'+s+'"></span>'+esc(v||'—')+'</div></div>';}
  function pf(v){if(!v)return'';if(v.toUpperCase()==='PASS')return'<span style="color:var(--green);font-weight:600;">PASS</span>';if(v.toUpperCase()==='FAIL')return'<span style="color:var(--red);font-weight:600;">FAIL</span>';return esc(v);}
  function expSt(iso){if(!iso)return'gray';if(iso==='update_service')return'green';var d=new Date(iso),now=new Date(),t=new Date(now);t.setDate(t.getDate()+30);if(d<now)return'red';if(d<=t)return'amber';return'green';}
  function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
  function tog(el){var b=el.nextElementSibling,c=el.querySelector('.chevron');if(b.style.display==='none'){b.style.display='';c.classList.add('open');}else{b.style.display='none';c.classList.remove('open');}}

  // ══ TABS ══
  function switchTab(tab,btn){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    if(btn)btn.classList.add('active');
    document.getElementById('searchView').classList.toggle('hidden',tab!=='search');
    document.getElementById('dashboardView').classList.toggle('hidden',tab!=='dashboard');
    saveSession({tab:tab});
    if(tab==='dashboard'&&!dashboardData.length)loadDashboard();
  }

  // ══ DASHBOARD ══
  function loadDashboard(){
    document.getElementById('dashboardStats').innerHTML='<div class="loading"><div class="spinner"></div></div>';
    document.getElementById('dashboardTable').innerHTML='';
    apiCall('hubdashboard').then(function(d){dashboardData=d.tutors||[];populateAreaFilter();filterDashboard();});
  }
  function populateAreaFilter(){
    var areas={};
    dashboardData.forEach(function(t){
      (t.areas||[]).forEach(function(a){if(a)areas[a]=true;});
    });
    var s=document.getElementById('areaFilter');
    s.innerHTML='<option value="">All Areas / Councils</option>';
    Object.keys(areas).sort().forEach(function(v){s.innerHTML+='<option value="'+esc(v)+'">'+esc(v)+'</option>';});
  }
  function getFilteredTutors(){
    var area=document.getElementById('areaFilter').value;
    if(!area)return dashboardData;
    return dashboardData.filter(function(t){return(t.areas||[]).indexOf(area)>-1;});
  }
  function isCompliant(t){
    var good=['valid','completed','update_service'];
    return good.indexOf(t.dbs)>-1&&good.indexOf(t.safeguarding)>-1;
  }
  function filterDashboard(){
    var f=getFilteredTutors();
    var exportType=document.getElementById('exportType').value;
    
    // Apply compliant filter if selected
    var displayed=f;
    if(exportType==='audit-compliant'){displayed=f.filter(isCompliant);}
    
    // Stats always show full filtered set (before compliant filter)
    var st={valid:0,expiring:0,expired:0,none:0};
    f.forEach(function(t){if(t.safeguarding==='valid'||t.safeguarding==='completed')st.valid++;else if(t.safeguarding==='expiring')st.expiring++;else if(t.safeguarding==='expired')st.expired++;else st.none++;});
    document.getElementById('dashboardStats').innerHTML='<div class="stat-card"><div class="stat-number">'+f.length+'</div><div class="stat-label">Total Tutors</div></div><div class="stat-card stat-green"><div class="stat-number">'+st.valid+'</div><div class="stat-label">Compliant</div></div><div class="stat-card stat-amber"><div class="stat-number">'+st.expiring+'</div><div class="stat-label">Expiring Soon</div></div><div class="stat-card stat-red"><div class="stat-number">'+st.expired+'</div><div class="stat-label">Expired</div></div><div class="stat-card stat-gray"><div class="stat-number">'+st.none+'</div><div class="stat-label">No Record</div></div>';
    
    // Show count of displayed tutors if filtered
    var tableHeader='';
    if(exportType==='audit-compliant'){tableHeader='<div style="padding:12px 16px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);">Showing <strong>'+displayed.length+'</strong> compliant tutors (of '+f.length+' total)</div>';}
    
    var h=tableHeader+'<table class="data-table"><thead><tr><th>Name</th><th>Area</th><th>DBS</th><th>Safeguarding</th><th>First Aid</th></tr></thead><tbody>';
    displayed.forEach(function(t){
      var areaDisplay=(t.areas||[]).join(', ');
      h+='<tr onclick="selectTutor(\''+t.name.replace(/'/g,"\\'")+'\');switchTab(\'search\');document.querySelectorAll(\'.tab\').forEach(function(el){el.classList.remove(\'active\')});document.querySelectorAll(\'.tab\')[0].classList.add(\'active\');"><td><strong>'+esc(t.name)+'</strong></td><td>'+esc(areaDisplay)+'</td><td>'+pill(t.dbs)+'</td><td>'+pill(t.safeguarding)+'</td><td>'+pill(t.firstAid)+'</td></tr>';
    });
    h+='</tbody></table>';
    document.getElementById('dashboardTable').innerHTML=h;
  }
  function pill(s){var m={'valid':'<span class="badge badge-green">● Valid</span>','completed':'<span class="badge badge-green">● Complete</span>','update_service':'<span class="badge badge-green">● Update Service</span>','expiring':'<span class="badge badge-amber">● Expiring</span>','expired':'<span class="badge badge-red">● Expired</span>','fail':'<span class="badge badge-red">● Failed</span>','none':'<span class="badge badge-gray">○ None</span>'};return m[s]||m['none'];}

  // ══ EXPORT ══
  function doExport(){
    var type=document.getElementById('exportType').value;
    if(type==='summary'){exportSummaryCSV();}
    else{exportAuditCSV(type==='audit-compliant');}
  }
  function exportProfileCSV(){
    var name=document.getElementById('searchInput').value.trim();
    if(!name)return;
    var btn=document.querySelector('.export-row .btn-outline');
    var orig=btn.textContent;
    btn.textContent='Exporting...';btn.disabled=true;

    apiCall('hubsearch',{name:name}).then(function(data){
      btn.textContent=orig;btn.disabled=false;
      var csv=['"Category","Detail","Date","Score","Result","Certificate No","Expiry Date","Source"'];
      var safeName=name.replace(/"/g,'""');

      // Training records
      (data.training||[]).forEach(function(r){
        csv.push('"Training","'+esc2(r.trainingName)+'","'+esc2(r.dateCompleted)+'","'+esc2(r.score)+'","'+esc2(r.passFail)+'","'+esc2(r.certNumber)+'","'+esc2(r.expiryDate)+'","'+esc2(r.source)+'"');
      });

      // DBS
      if(data.dbs){
        csv.push('"DBS","DBS Number: '+esc2(data.dbs.dbsNumber)+'","'+esc2(data.dbs.dbsCheckDate)+'","","","'+esc2(data.dbs.dbsNumber)+'","'+esc2(data.dbs.dbsExpiryDate)+'","SCR"');
        csv.push('"DBS","Level of Check: '+esc2(data.dbs.levelOfCheck)+'","","","","","","SCR"');
        csv.push('"DBS","Issue Date: '+esc2(data.dbs.dbsIssueDate)+'","'+esc2(data.dbs.dbsIssueDate)+'","","","","","SCR"');
      }

      // References
      if(data.refs){
        if(data.refs.ref1Position||data.refs.ref1Received)csv.push('"Reference","Reference 1: '+esc2(data.refs.ref1Position)+'","'+esc2(data.refs.ref1Received)+'","","","","","SCR"');
        if(data.refs.ref2Position||data.refs.ref2Received)csv.push('"Reference","Reference 2: '+esc2(data.refs.ref2Position)+'","'+esc2(data.refs.ref2Received)+'","","","","","SCR"');
        if(data.refs.verifiedByPhone)csv.push('"Reference","Verified by Phone: Yes","","","","","","SCR"');
      }

      // Suitability
      if(data.suitability){
        if(data.suitability.socialCheck)csv.push('"Suitability","Social Media Check","'+esc2(data.suitability.socialCheck)+'","","","","","SCR"');
        if(data.suitability.section128)csv.push('"Suitability","Section 128 Check","'+esc2(data.suitability.section128)+'","","","","","SCR"');
        if(data.suitability.teachingChecks)csv.push('"Suitability","Teaching Checks","'+esc2(data.suitability.teachingChecks)+'","","","","","SCR"');
      }

      // Interview
      if(data.interview){
        csv.push('"Interview","Interview Date","'+esc2(data.interview.date)+'","","","","","SCR"');
        if(data.interview.interviewer)csv.push('"Interview","Interviewer: '+esc2(data.interview.interviewer)+'","","","","","","Interview Form"');
        if(data.interview.hiringDecision)csv.push('"Interview","Hiring Decision: '+esc2(data.interview.hiringDecision)+'","","","","","","Interview Form"');
        if(data.interview.professionalism)csv.push('"Interview","Professionalism: '+esc2(data.interview.professionalism)+'","","","","","","Interview Form"');
        if(data.interview.communication)csv.push('"Interview","Communication: '+esc2(data.interview.communication)+'","","","","","","Interview Form"');
        if(data.interview.safeguarding)csv.push('"Interview","Safeguarding: '+esc2(data.interview.safeguarding)+'","","","","","","Interview Form"');
        if(data.interview.sendExperience)csv.push('"Interview","SEND/SEMH Experience: '+esc2(data.interview.sendExperience)+'","","","","","","Interview Form"');
        if(data.interview.confidence1to1)csv.push('"Interview","Confidence 1:1: '+esc2(data.interview.confidence1to1)+'","","","","","","Interview Form"');
        if(data.interview.availability)csv.push('"Interview","Availability: '+esc2(data.interview.availability)+'","","","","","","Interview Form"');
      }

      dl(csv.join('\n'),safeName.replace(/\s+/g,'_')+'_training_record.csv');
    }).catch(function(e){btn.textContent=orig;btn.disabled=false;alert('Export failed.');});
  }
  function esc2(s){return String(s||'').replace(/"/g,'""');}
  function exportSummaryCSV(){
    var f=getFilteredTutors();
    var csv=['"Name","Areas","DBS","Safeguarding","First Aid"'];
    f.forEach(function(t){csv.push('"'+t.name+'","'+(t.areas||[]).join(', ')+'","'+t.dbs+'","'+t.safeguarding+'","'+t.firstAid+'"');});
    dl(csv.join('\n'),'dashboard_summary.csv');
  }
  function exportAuditCSV(compliantOnly){
    var f=getFilteredTutors();
    if(compliantOnly)f=f.filter(isCompliant);
    if(!f.length){alert('No tutors match the selected filter.');return;}
    var names=f.map(function(t){return t.name;});
    // Show loading
    var btn=document.querySelector('.dashboard-controls .btn-outline');
    var origText=btn.textContent;
    btn.textContent='Exporting...';btn.disabled=true;
    apiCall('hubauditexport',{names:names}).then(function(d){
      btn.textContent=origText;btn.disabled=false;
      var records=d.records||[];
      if(!records.length){alert('No records found for selected tutors.');return;}
      var csv=['"Name","Area","Category","Detail","Date","Score","Result","Certificate No","Expiry Date","Source"'];
      records.forEach(function(r){
        csv.push('"'+(r.fullName||'')+'","'+(r.area||'')+'","'+(r.category||'')+'","'+(r.item||'')+'","'+(r.dateCompleted||'')+'","'+(r.score||'')+'","'+(r.passFail||'')+'","'+(r.certNumber||'')+'","'+(r.expiryDate||'')+'","'+(r.source||'')+'"');
      });
      var area=document.getElementById('areaFilter').value||'all';
      dl(csv.join('\n'),'audit_export_'+area+'_'+(compliantOnly?'compliant':'all')+'.csv');
    }).catch(function(e){btn.textContent=origText;btn.disabled=false;alert('Export failed. Please try again.');});
  }
  function dl(c,f){var b=new Blob([c],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=f;a.click();}

</script>
</body>
</html>
